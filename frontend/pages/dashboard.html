<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BHEL SAP Portal — Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- Stat Cards Grid -->
  <div class="stats-grid">
    <div class="stat-card info" style="cursor: pointer;" onclick="location.href='library.html'">
      <div class="stat-icon">📄</div>
      <div class="stat-value" id="manuals">0</div>
      <div class="stat-label">SAP Manuals</div>
    </div>
    <div class="stat-card warning" style="cursor: pointer;" onclick="location.href='library.html'">
      <div class="stat-icon">🎬</div>
      <div class="stat-value" id="videos">0</div>
      <div class="stat-label">Video Tutorials</div>
    </div>
    <div class="stat-card danger" style="cursor: pointer;" onclick="location.href='query.html'">
      <div class="stat-icon">💬</div>
      <div class="stat-value" id="queries">0</div>
      <div class="stat-label">Open Queries</div>
    </div>
    <div class="stat-card success" style="cursor: pointer;" onclick="location.href='faqs.html'">
      <div class="stat-icon">❓</div>
      <div class="stat-value" id="faqs">0</div>
      <div class="stat-label">FAQs</div>
    </div>
  </div>

  <!-- Main Dashboard Grid -->
  <div class="dash-grid">
    <!-- FAQs Card -->
    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Frequently Asked Questions (FAQs)</h3>
      </div>
      <p class="text-muted text-small mb-16">Quick answers to common SAP issues:</p>
      <div class="faq-list" id="dashboard-faq-list">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Quick Links Card -->
    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Quick SAP Access T-Codes</h3>
      </div>
      <p class="text-muted text-small mb-16">Frequently used SAP shortcuts for your module:</p>
      <div class="quick-links" id="quick-links-list">
        <div class="empty-state">
          <p>No transaction codes configured for your department yet.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/common.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
