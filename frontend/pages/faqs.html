<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BHEL SAP Portal — FAQs</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- FAQ Toolbar -->
  <div class="filter-bar">
    <select id="faq-dept-filter" style="display: none;" onchange="filterFaqs()">
      <!-- Populated dynamically for SUPER_ADMIN -->
    </select>

    <button class="btn btn-primary" id="add-faq-btn" style="display: none;" onclick="openAddFaqModal()">
      ➕ Create FAQ Entry
    </button>
  </div>

  <!-- FAQs Accordion List -->
  <div class="faq-list" id="faqList">
    <div class="empty-state">
      <div class="empty-icon">❓</div>
      <p>Loading module FAQs...</p>
    </div>
  </div>

  <!-- Create/Edit FAQ Modal -->
  <div class="modal-overlay" id="faq-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="faq-modal-title">Create FAQ Entry</h3>
        <button class="modal-close" onclick="closeModal('faq-modal')">×</button>
      </div>
      <form id="faq-form" onsubmit="saveFaq(event)">
        <input type="hidden" id="faq-edit-id">

        <div class="form-group">
          <label for="faq-question">Question</label>
          <input type="text" id="faq-question" required placeholder="e.g. How do I clear open items?">
        </div>

        <div class="form-group">
          <label for="faq-answer">Answer</label>
          <textarea id="faq-answer" required rows="5" placeholder="Provide step-by-step instructions or explanations..."></textarea>
        </div>

        <div class="profile-grid">
          <div class="form-group">
            <label for="faq-order">Display Sort Order</label>
            <input type="number" id="faq-order" value="0" min="0" required placeholder="0">
          </div>
          <div class="form-group" id="faq-dept-group" style="display: none;">
            <label for="faq-dept">SAP Module / Dept</label>
            <select id="faq-dept">
              <!-- Dynamically populated for Super Admin -->
            </select>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal('faq-modal')">Cancel</button>
          <button type="submit" class="btn btn-success">Save FAQ</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/common.js?v=4"></script>
  <script src="../js/faq.js"></script>
</body>
</html>
